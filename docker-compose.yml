version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doginals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  kabosu:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # RPC credentials — override here or in kabosu.toml
      DOGE_RPC_USERNAME: ${DOGE_RPC_USERNAME:-doge}
      DOGE_RPC_PASSWORD: ${DOGE_RPC_PASSWORD:-doge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - ./kabosu.toml:/etc/kabosu.toml:ro
      # Mount Dogecoin Core data directory for fast .blk reads (optional but recommended)
      # - /path/to/.dogecoin:/root/.dogecoin:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:

