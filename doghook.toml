# Doghook Configuration
# Generated from F:\DogecoinData\dogecoin.conf

[storage]
working_dir = "data"

[metrics]
enabled = true
prometheus_port = 9153

# Doginals (Dogecoin Ordinals) indexer configuration
[doginals.db]
database = "doginals"
host = "localhost"
port = 5432
username = "postgres"
password = "postgres"

# Hiro-style predicate-driven selective indexing (matches Chainhook/Ordhook design).
# When enabled = false (default), all inscriptions are indexed (full backward-traversal).
# When enabled = true, only inscriptions matching ALL non-empty filter lists are indexed.
[doginals.predicates]
enabled = false
# mime_types = ["image/png", "image/jpeg", "text/plain"]  # empty = any content-type
# content_prefixes = ["dog", "shibe", "woof", "doge"]     # empty = any body content

# DRC-20 (Dogecoin's BRC-20 equivalent) configuration
[doginals.meta_protocols.drc20]
enabled = true
lru_cache_size = 10000

[doginals.meta_protocols.drc20.db]
database = "drc20"
host = "localhost"
port = 5432
username = "postgres"
password = "postgres"

# Dunes (Dogecoin's Runes equivalent) indexer configuration
[dunes]
lru_cache_size = 10000

[dunes.db]
database = "dunes"
host = "localhost"
port = 5432
username = "postgres"
password = "postgres"

# Dogecoin RPC connection (from F:\DogecoinData\dogecoin.conf)
[dogecoin]
network = "mainnet"
rpc_url = "http://127.0.0.1:22555"
# rpc_username and rpc_password are read from env vars DOGE_RPC_USERNAME / DOGE_RPC_PASSWORD.
# You may also set them here, but do not commit credentials to git.
zmq_url = "tcp://127.0.0.1:28332"

# Protocol enable/disable switches.
# Set enabled = false to skip indexing that protocol entirely.
# DNS and Dogemap both default to true (index everything) when this section is absent.
[protocols.dns]
enabled = true

[protocols.dogemap]
enabled = true

# doge-lotto meta-protocol. Inscriptions with "p":"doge-lotto" are indexed.
# Set enabled = false to skip all lotto events.
[protocols.lotto]
enabled = true
content_prefixes = ['{"p":"doge-lotto"']
protocol_dev_address = ""
# Optional destination for immutable lotto mint tips (set this before using `doghook lotto mint --tip`).

# Webhook delivery configuration.
# When enabled = true, doghook POSTs a JSON event to every URL in the list
# whenever a new DNS registration or Dogemap claim is indexed.
#
# DNS event payload:
#   { "event": "dns.registered", "name": "satoshi.doge",
#     "inscription_id": "<txid>i0", "block_height": N, "block_timestamp": N }
#
# Dogemap event payload:
#   { "event": "dogemap.claimed", "block_number": N,
#     "inscription_id": "<txid>i0", "claim_height": N, "claim_timestamp": N }
[webhooks]
enabled = false
urls = []
# urls = ["https://your-server.example.com/hook"]

# Resource configuration
[resources]
ulimit = 2048
cpu_core_available = 6
memory_available = 16
dogecoin_rpc_threads = 4
dogecoin_rpc_timeout = 15
indexer_channel_capacity = 10
