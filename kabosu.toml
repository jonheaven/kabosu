# Kabosu Configuration
# Dogecoin Core location is read from DOGECOIN_DATA_DIR by the shared launch scripts.

[storage]
working_dir = "data"

[metrics]
enabled = true
prometheus_port = 9153

[web]
enabled = true
port = 8080

# Doginals (Dogecoin Ordinals) indexer configuration
[doginals.db]
database = "doginals"
host = "localhost"
port = 5432
username = "postgres"
password = "postgres"

# Hiro-style predicate-driven selective indexing (matches Chainhook/Ordhook design).
# When enabled = false (default), all inscriptions are indexed (full backward-traversal).
# When enabled = true, only inscriptions matching ALL non-empty filter lists are indexed.
[doginals.predicates]
enabled = false
# mime_types = ["image/png", "image/jpeg", "text/plain"]  # empty = any content-type
# content_prefixes = ["dog", "shibe", "woof", "doge"]     # empty = any body content

# DRC-20 (Dogecoin's BRC-20 equivalent) configuration
[doginals.meta_protocols.drc20]
enabled = true
lru_cache_size = 10000

[doginals.meta_protocols.drc20.db]
database = "drc20"
host = "localhost"
port = 5432
username = "postgres"
password = "postgres"

# Dunes (Dogecoin's Runes equivalent) indexer configuration
[dunes]
lru_cache_size = 10000

[dunes.db]
database = "dunes"
host = "localhost"
port = 5432
username = "postgres"
password = "postgres"

# Dogecoin RPC connection
[dogecoin]
network = "mainnet"
rpc_url = "http://127.0.0.1:22555"
# rpc_username and rpc_password are read from env vars DOGE_RPC_USERNAME / DOGE_RPC_PASSWORD.
# You may also set them here, but do not commit credentials to git.
zmq_url = "tcp://127.0.0.1:28332"
# Path to Dogecoin blockchain data directory for faster .blk file indexing (5-20× faster than RPC)
# DOGECOIN_DATA_DIR is the primary source of truth for Dogecoin Core's data dir.
# When unset, kabosu auto-detects the platform default Dogecoin data directory.
# dogecoin_data_dir = "F:\\DogecoinData"
# Optional override for the shadow copy location. Leave unset to keep the copy
# inside the active Dogecoin network data dir (for example F:\DogecoinData\blk-index).
# blk_index_copy_dir = "F:\\DogecoinData\\blk-index"

# Protocol enable/disable switches.
# Set enabled = false to skip indexing that protocol entirely.
# DNS and Dogemap both default to true (index everything) when this section is absent.
[protocols.dns]
enabled = true

[protocols.dogemap]
enabled = true

# Dogetag on-chain graffiti. Any OP_RETURN with valid UTF-8 text (<=80 bytes).
# Set enabled = false to skip detection entirely.
[protocols.dogetag]
enabled = true

# DogeSpells protocol. OP_RETURN payload must start with the DogeSpells magic prefix and decode as CBOR.
# Set enabled = false to skip DogeSpells spell indexing entirely.
# For a one-off dedicated DogeSpells sync: `kabosu doginals index sync --only dogespells --config-path kabosu.toml`
[protocols.dogespells]
enabled = true

# DogeLotto meta-protocol. Inscriptions with "p":"DogeLotto" are indexed.
# Set enabled = false to skip all DogeLotto events.
# For a one-off dedicated DogeLotto sync: `kabosu doginals index sync --only dogelotto --config-path kabosu.toml`
[protocols.lotto]
enabled = true
content_prefixes = ['{"p":"DogeLotto"']
protocol_dev_address = "DHrqn6H6ocgbRB1Szu7Q1sn1tVTfkpinnc"
# Optional destination for immutable lotto mint tips (set this before using `kabosu lotto mint --tip`).
burn_address = "DFmBjuJGGVRRomrdh1Eb77EnH1f9rtyHWp"
# Optional, used for Burners later

# DMP — inscription-based open marketplace.
# Inscriptions with "protocol":"DMP","version":"1.0" are indexed.
# Set enabled = false to skip all DMP market events.
# For a one-off dedicated DMP sync: `kabosu doginals index sync --only dmp --config-path kabosu.toml`
[protocols.dmp]
enabled = true

# Webhook delivery configuration.
# When enabled = true, kabosu POSTs a JSON event to every URL in the list
# whenever a new DNS registration or Dogemap claim is indexed.
#
# DNS event payload:
#   { "event": "dns.registered", "name": "satoshi.doge",
#     "inscription_id": "<txid>i0", "block_height": N, "block_timestamp": N }
#
# Dogemap event payload:
#   { "event": "dogemap.claimed", "block_number": N,
#     "inscription_id": "<txid>i0", "claim_height": N, "claim_timestamp": N }
[webhooks]
enabled = true
# wzrd.dog BlockWatch webhook receiver.
# For local dev use: "http://localhost:3000/api/kabosu-webhook"
urls = ["https://wzrd.dog/api/kabosu-webhook"]
# HMAC-SHA256 signing secret — set via WEBHOOK_HMAC_SECRET env var (do not commit here)
# hmac_secret = ""

# Override the default start height for targeted testing.
# Wipe data/ and all Postgres databases before changing this.
# Block 4,849,900 is a good spot with DRC-20, DNS, and Dogemap inscriptions nearby.
# start_block = 4849900

# Resource configuration
[resources]
ulimit = 2048
cpu_core_available = 6
memory_available = 16
dogecoin_rpc_threads = 4
dogecoin_rpc_timeout = 15
indexer_channel_capacity = 10
